<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6535"/>
      <stop offset="100%" stop-color="#fc4c02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square, deep dark -->
  <rect width="512" height="512" rx="112" fill="#0d0f18"/>

  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#fc4c02" stroke-width="3" opacity="0.18"/>

  <!-- ── Running figure ─────────────────────────────────────── -->

  <!-- Head -->
  <circle cx="300" cy="108" r="40" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Torso (leaning forward) -->
  <line x1="292" y1="145" x2="248" y2="278" stroke="url(#grad)" stroke-width="34" stroke-linecap="round"/>

  <!-- Back arm (swings forward, high) -->
  <line x1="276" y1="185" x2="196" y2="152" stroke="url(#grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- Front arm (swings back, low) -->
  <line x1="276" y1="185" x2="356" y2="238" stroke="url(#grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- Back leg (pushing off, extended behind) -->
  <line x1="248" y1="278" x2="320" y2="385" stroke="url(#grad)" stroke-width="32" stroke-linecap="round"/>
  <line x1="320" y1="385" x2="390" y2="362" stroke="url(#grad)" stroke-width="26" stroke-linecap="round"/>

  <!-- Front leg (reaching forward) -->
  <line x1="248" y1="278" x2="172" y2="375" stroke="url(#grad)" stroke-width="32" stroke-linecap="round"/>
  <line x1="172" y1="375" x2="118" y2="388" stroke="url(#grad)" stroke-width="26" stroke-linecap="round"/>

  <!-- Speed lines (motion) -->
  <line x1="76" y1="208" x2="136" y2="208" stroke="#fc4c02" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <line x1="58" y1="240" x2="148" y2="240" stroke="#fc4c02" stroke-width="10" stroke-linecap="round" opacity="0.38"/>
  <line x1="72" y1="272" x2="140" y2="272" stroke="#fc4c02" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
</svg>
